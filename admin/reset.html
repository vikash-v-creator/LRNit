<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Reset | LRNit Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-login-body">
    <div class="login-container" id="reset-card">
        <div class="cursor-glow" id="cursor-glow"></div>
        <div class="login-content">
            <div class="login-header">
                <a href="../index.html" class="logo anim-logo">
                    <img src="../assets/logo.png" alt="LRNit Logo" class="logo-img" />
                    LRN<span class="accent">it</span>
                </a>
                <h2 class="anim-title">Reset Password</h2>
                <p class="anim-title">Enter your admin email to receive a reset link.</p>
            </div>
            <form id="reset-form" class="login-form anim-form">
                <div class="form-group">
                    <label for="reset-email">Email Address</label>
                    <input type="email" id="reset-email" required placeholder="admin@lrnit.com" />
                    <div id="email-error" class="field-error-msg"></div>
                </div>
                <div id="reset-error" class="form-message error-message" style="display:none;"></div>
                <div id="reset-success" class="form-message success-message" style="display:none;"></div>
                <button type="submit" id="reset-submit-btn" class="btn-primary anim-btn">
                    <div class="spinner" id="reset-spinner" style="display:none;"></div>
                    <span id="reset-btn-text">Send Reset Link</span>
                </button>
            </form>
            <div class="login-footer anim-form" style="animation-delay: 400ms;">
                <a href="login.html">← Back to Login</a>
            </div>
        </div>
    </div>
    <script type="module">
        import { supabase } from "../js/supabase-client.js";
        const form = document.getElementById("reset-form");
        const emailInput = document.getElementById("reset-email");
        const errorMsg = document.getElementById("reset-error");
        const successMsg = document.getElementById("reset-success");
        const submitBtn = document.getElementById("reset-submit-btn");
        const btnText = document.getElementById("reset-btn-text");
        const spinner = document.getElementById("reset-spinner");

        emailInput.addEventListener('input', () => {
            emailInput.classList.remove('input-error');
            errorMsg.style.display = 'none';
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            // UI reset
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';
            emailInput.classList.remove('input-error');
            submitBtn.disabled = true;
            btnText.textContent = "Sending...";
            spinner.style.display = "block";
            const { error } = await supabase.auth.resetPasswordForEmail(email, {
                redirectTo: `${window.location.origin}/admin/login.html`
            });
            if (error) {
                console.error("Reset error:", error);
                emailInput.classList.add('input-error');
                errorMsg.textContent = error.message || "Failed to send reset link.";
                errorMsg.style.display = "block";
            } else {
                successMsg.textContent = "Reset link sent! Check your email.";
                successMsg.style.display = "block";
            }
            submitBtn.disabled = false;
            btnText.textContent = "Send Reset Link";
            spinner.style.display = "none";
        });
    </script>
</body>
</html>
